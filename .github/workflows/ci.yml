name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff / mypy / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format --check)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Test (pytest)
        run: uv run pytest

  frontend:
    name: Frontend (tsc / biome / build / vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Type check (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (biome check)
        run: npm run check

      - name: Build (vite build)
        run: npm run build

      - name: Test (vitest run)
        run: npm run test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- バックエンド準備 ---
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install BE dependencies
        run: uv sync --frozen
        working-directory: backend

      # --- フロントエンド準備 ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install FE dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      # --- Playwright ブラウザ ---
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright OS deps
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: frontend

      # --- BE / FE 起動 ---
      - name: Start backend
        run: |
          nohup uv run uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/backend.log 2>&1 &
          npx -y wait-on http-get://127.0.0.1:8000/healthz --timeout 60000
        working-directory: backend

      - name: Start frontend
        run: |
          nohup npx vite --host 127.0.0.1 --port 5173 > /tmp/frontend.log 2>&1 &
          npx -y wait-on http-get://127.0.0.1:5173 --timeout 60000
        working-directory: frontend

      # --- Playwright 実行 ---
      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
        run: npx playwright test
        working-directory: frontend

      # --- 失敗時の証跡 ---
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: |
            /tmp/backend.log
            /tmp/frontend.log
          retention-days: 14
